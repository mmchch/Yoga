<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>自然のめぐみ — サインイン</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --sage: #6b9e70;
  --sage-light: #9ec4a2;
  --sage-dark: #3d6b42;
  --sage-mist: #eef4ef;
  --cream: #f7f3ed;
  --warm: #faf8f4;
  --earth: #8b6f47;
  --charcoal: #252525;
  --ink: #1a1a1a;
  --accent: #c4916a;
  --soft-red: #c97878;
  --gold: #b8923a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--cream);
  color: var(--charcoal);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================================
   KIOSK MODE — student-facing
   ============================================================ */
#kioskMode {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--cream);
  position: relative;
}

/* Organic top accent */
#kioskMode::before {
  content: '';
  position: fixed;
  top: -120px; left: -80px;
  width: 420px; height: 420px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,158,112,0.13) 0%, transparent 70%);
  pointer-events: none;
}

#kioskMode::after {
  content: '';
  position: fixed;
  bottom: -100px; right: -60px;
  width: 340px; height: 340px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,145,106,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.kiosk-header {
  text-align: center;
  padding: 36px 24px 20px;
  position: relative;
}

.kiosk-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.6rem;
  font-weight: 300;
  font-style: italic;
  color: var(--sage-dark);
  letter-spacing: 0.06em;
  line-height: 1;
}

.kiosk-sub {
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  color: var(--sage-light);
  text-transform: uppercase;
  margin-top: 8px;
}

.kiosk-date {
  margin-top: 14px;
  font-size: 0.78rem;
  color: var(--earth);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.08em;
}

/* Class selector strip */
.class-strip {
  padding: 0 20px 20px;
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.class-strip::-webkit-scrollbar { display: none; }

.class-pill {
  flex-shrink: 0;
  padding: 10px 20px;
  border-radius: 50px;
  border: 1.5px solid var(--sage-light);
  background: white;
  cursor: pointer;
  transition: all 0.22s;
  text-align: center;
  min-width: 140px;
}

.class-pill.active {
  background: var(--sage);
  border-color: var(--sage);
  color: white;
  box-shadow: 0 4px 16px rgba(107,158,112,0.35);
}

.class-pill-name {
  font-size: 0.83rem;
  color: inherit;
  display: block;
}

.class-pill.active .class-pill-name { color: white; }

.class-pill-time {
  font-size: 0.62rem;
  color: var(--sage-light);
  font-family: 'Space Mono', monospace;
  display: block;
  margin-top: 3px;
}

.class-pill.active .class-pill-time { color: rgba(255,255,255,0.75); }

/* Welcome text */
.kiosk-prompt {
  text-align: center;
  padding: 0 24px 20px;
}

.kiosk-prompt-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 300;
  font-style: italic;
  color: var(--sage-dark);
}

.kiosk-prompt-sub {
  font-size: 0.72rem;
  color: var(--sage-light);
  margin-top: 4px;
  letter-spacing: 0.08em;
}

/* Member buttons grid */
.aiueo-btn {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--sage-light);
  background: white;
  color: var(--sage-dark);
  cursor: pointer;
  transition: all 0.15s;
}
.aiueo-btn.active {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.member-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  padding: 0 20px 20px;
}

.member-tap-btn {
  background: white;
  border: 2px solid transparent;
  border-radius: 20px;
  padding: 22px 16px 18px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

.member-tap-btn:active {
  transform: scale(0.94);
}

.member-tap-btn.signed-in {
  background: var(--sage-mist);
  border-color: var(--sage);
  pointer-events: none;
}

.member-tap-btn.signed-in::after {
  content: '✓';
  position: absolute;
  top: 10px; right: 12px;
  font-size: 0.85rem;
  color: var(--sage);
  font-weight: 600;
}

.tap-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(107,158,112,0.25);
  transform: scale(0);
  animation: ripple 0.5s ease-out;
  pointer-events: none;
}

@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

.member-avatar-k {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sage-light), var(--sage));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  color: white;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  transition: all 0.2s;
}

.member-tap-btn.signed-in .member-avatar-k {
  background: linear-gradient(135deg, var(--sage), var(--sage-dark));
}

.member-tap-name {
  font-size: 0.85rem;
  color: var(--charcoal);
  text-align: center;
  line-height: 1.3;
}

.member-tap-ticket {
  font-size: 0.62rem;
  color: var(--sage-light);
  background: var(--sage-mist);
  padding: 2px 8px;
  border-radius: 20px;
}

.member-tap-btn.signed-in .member-tap-ticket {
  color: var(--sage-dark);
  background: rgba(107,158,112,0.15);
}

/* Admin toggle */
.admin-toggle {
  text-align: center;
  padding: 16px;
}

.admin-link {
  font-size: 0.65rem;
  color: var(--sage-light);
  cursor: pointer;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: none;
  background: none;
  font-family: 'Noto Serif JP', serif;
  transition: color 0.2s;
}

.admin-link:hover { color: var(--sage); }

/* Big success overlay */
.checkin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,107,66,0.95);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.checkin-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.checkin-checkmark {
  font-size: 5rem;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from { transform: scale(0) rotate(-15deg); }
  to { transform: scale(1) rotate(0); }
}

.checkin-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  color: white;
  font-style: italic;
  margin-top: 16px;
  animation: fadeUp 0.4s ease 0.1s both;
}

.checkin-msg {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.75);
  margin-top: 8px;
  letter-spacing: 0.12em;
  animation: fadeUp 0.4s ease 0.2s both;
}

.checkin-class {
  margin-top: 20px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.55);
  font-family: 'Space Mono', monospace;
  animation: fadeUp 0.4s ease 0.3s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   ADMIN MODE
   ============================================================ */
#adminMode {
  display: none;
  min-height: 100vh;
}

#adminMode.visible { display: block; }

.admin-bar {
  background: var(--sage-dark);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.admin-bar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-style: italic;
  font-weight: 300;
  letter-spacing: 0.08em;
}

.back-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 7px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Noto Serif JP', serif;
  transition: background 0.2s;
}

.back-btn:hover { background: rgba(255,255,255,0.25); }

.admin-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* Admin tabs */
.admin-tabs {
  display: flex;
  gap: 2px;
  background: var(--sage-mist);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
  border: 1px solid rgba(107,158,112,0.2);
}

.atab {
  flex: 1;
  padding: 9px 8px;
  border: none;
  background: transparent;
  border-radius: 9px;
  cursor: pointer;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.76rem;
  color: var(--earth);
  transition: all 0.2s;
}

.atab.active {
  background: white;
  color: var(--sage-dark);
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.apanel { display: none; }
.apanel.active { display: block; }

/* Cards */
.acard {
  background: white;
  border-radius: 16px;
  padding: 22px;
  border: 1px solid rgba(107,158,112,0.15);
  box-shadow: 0 2px 14px rgba(0,0,0,0.04);
  margin-bottom: 18px;
}

.alabel {
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 14px;
  display: block;
}

/* Input / Select */
.af-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e8ede9;
  border-radius: 10px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.83rem;
  background: var(--warm);
  color: var(--charcoal);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}

.af-input:focus { border-color: var(--sage-light); }

.af-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 500px) { .af-row { grid-template-columns: 1fr; } }

.af-label {
  font-size: 0.63rem;
  letter-spacing: 0.12em;
  color: var(--sage);
  text-transform: uppercase;
  display: block;
  margin-bottom: 5px;
}

.af-group { margin-bottom: 10px; }

/* Buttons */
.abtn {
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.82rem;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.abtn-green { background: var(--sage); color: white; }
.abtn-green:hover { background: var(--sage-dark); }
.abtn-outline { background: transparent; color: var(--sage-dark); border: 1.5px solid var(--sage-light); }
.abtn-outline:hover { background: var(--sage-mist); }

/* Attendance list */
.att-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--warm);
  border-radius: 10px;
  border: 1px solid #e8ede9;
  margin-bottom: 6px;
  animation: slideIn 0.28s ease;
}

@keyframes slideIn {
  from { opacity:0; transform: translateY(-5px); }
  to { opacity:1; transform: translateY(0); }
}

.att-name { font-size: 0.85rem; }

.att-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* Badges */
.badge {
  font-size: 0.62rem;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

.b-monthly { background: rgba(107,158,112,0.12); color: var(--sage-dark); }
.b-drop { background: rgba(196,145,106,0.12); color: var(--accent); }
.b-10 { background: rgba(61,107,66,0.10); color: var(--sage-dark); }
.b-free { background: rgba(201,120,120,0.12); color: var(--soft-red); }

.time-txt {
  font-size: 0.65rem;
  color: var(--sage-light);
  font-family: 'Space Mono', monospace;
}

.count-bubble {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(107,158,112,0.1);
  border-radius: 20px;
  padding: 5px 14px;
  margin-bottom: 12px;
}

.count-n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  color: var(--sage-dark);
  line-height: 1;
}

.count-lbl { font-size: 0.68rem; color: var(--sage); }

/* Calendar */
.cal-wrap { background: white; border-radius:16px; padding:22px; border:1px solid rgba(107,158,112,0.15); box-shadow:0 2px 14px rgba(0,0,0,0.04); margin-bottom:18px; }

.cal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-mn { font-family:'Cormorant Garamond',serif; font-size:1.35rem; font-style:italic; font-weight:300; color:var(--sage-dark); }
.cal-nb { width:30px;height:30px;border:1px solid var(--sage-light);border-radius:50%;background:white;cursor:pointer;font-size:0.85rem;color:var(--sage-dark);display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
.cal-nb:hover { background:var(--sage-mist); }
.cal-dh { display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px; }
.cal-dl { font-size:0.62rem;letter-spacing:0.08em;color:var(--sage);padding:4px; }
.cal-dg { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
.cal-d { aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:0.78rem;position:relative;transition:all 0.18s;padding:2px; }
.cal-d:hover { background:var(--sage-mist); }
.cal-d.today { background:rgba(107,158,112,0.1);font-weight:600;color:var(--sage-dark); }
.cal-d.sel { background:var(--sage);color:white; }
.cal-d.empty { cursor:default; }
.cal-d.has::after { content:'';width:4px;height:4px;background:var(--accent);border-radius:50%;position:absolute;bottom:3px; }

.log-entry { padding:14px;border-radius:12px;background:var(--warm);border:1px solid #e8ede9;margin-bottom:10px; }
.log-cn { font-size:0.88rem;font-weight:400;color:var(--charcoal);margin-bottom:6px; }
.log-meta { display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px; }
.log-cb { background:rgba(107,158,112,0.1);color:var(--sage-dark);font-size:0.7rem;padding:3px 10px;border-radius:20px;font-family:'Space Mono',monospace; }
.log-t { font-size:0.68rem;color:var(--earth);font-family:'Space Mono',monospace; }
.log-names { font-size:0.7rem;color:var(--sage);line-height:1.6; }

/* Member cards */
.m-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px; }
.m-card { background:white;border-radius:16px;padding:18px;border:1px solid rgba(107,158,112,0.15);box-shadow:0 2px 12px rgba(0,0,0,0.04);transition:all 0.2s;cursor:pointer; }
.m-card:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08); }
.m-av { width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--sage-light),var(--sage));display:flex;align-items:center;justify-content:center;font-size:1rem;color:white;font-family:'Cormorant Garamond',serif;margin-bottom:10px; }
.m-nm { font-size:0.92rem;color:var(--charcoal);margin-bottom:2px; }
.m-id { font-size:0.62rem;color:var(--sage-light);font-family:'Space Mono',monospace;margin-bottom:10px; }
.m-st { display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px; }
.m-sb { background:var(--warm);border-radius:8px;padding:7px 9px; }
.m-sv { font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--sage-dark); }
.m-sl { font-size:0.6rem;color:var(--sage); }
.m-lv { font-size:0.7rem;color:var(--earth);padding:5px 9px;background:rgba(196,145,106,0.07);border-radius:7px; }

/* Ticket table */
.t-table { width:100%;border-collapse:collapse;font-size:0.78rem; }
.t-table th { text-align:left;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--sage);padding:7px 10px;border-bottom:1px solid #e8ede9;font-weight:400; }
.t-table td { padding:10px 10px;border-bottom:1px solid rgba(232,237,233,0.8);color:var(--charcoal); }
.t-table tr:last-child td { border-bottom:none; }
.t-table tr:hover td { background:var(--warm); }

/* Modal */
.moverlay { position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px); }
.moverlay.open { display:flex; }
.modal { background:white;border-radius:20px;padding:28px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.14);animation:mIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes mIn { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.mhdr { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px; }
.mbtn-close { background:none;border:none;cursor:pointer;color:var(--sage-light);font-size:1.2rem;padding:4px;transition:color 0.2s;line-height:1; }
.mbtn-close:hover { color:var(--charcoal); }
.hist-list { list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:8px; }
.hist-li { font-size:0.72rem;color:var(--charcoal);padding:6px 9px;background:var(--sage-mist);border-radius:7px;display:flex;justify-content:space-between; }

/* Toast */
.toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--charcoal);color:white;padding:12px 24px;border-radius:40px;font-size:0.8rem;z-index:500;opacity:0;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0);opacity:1; }
.toast.ok { background:var(--sage-dark); }
.toast.err { background:var(--soft-red); }
.toast.inf { background:var(--earth); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--sage-light);border-radius:2px; }

.empty { text-align:center;padding:36px 20px;color:var(--sage-light); }
.empty-icon { font-size:2.2rem;margin-bottom:10px; }
.empty-txt { font-size:0.8rem; }

.kiosk-setup-btn {
  margin-top: 10px;
  padding: 8px 22px;
  background: var(--earth);
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  transition: background 0.2s;
}
.kiosk-setup-btn:hover { background: #7a5e38; }

.setup-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 400;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(6px);
}
.setup-modal-overlay.open { display: flex; }
.setup-modal {
  background: white;
  border-radius: 22px;
  padding: 32px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: mIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.setup-class-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.setup-class-item {
  padding: 16px 18px;
  border-radius: 14px;
  border: 2px solid var(--sage-mist);
  cursor: pointer;
  transition: all 0.2s;
  background: var(--warm);
}
.setup-class-item:hover { border-color: var(--sage-light); background: var(--sage-mist); }
.setup-class-item.selected { border-color: var(--sage); background: rgba(107,158,112,0.08); }
.setup-class-item-name { font-size: 0.95rem; color: var(--charcoal); margin-bottom: 3px; }

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyeKFO5dK6iZY323kUQrwKMkKk2BJ8C0cbuFkOgGeJSFEw8QUsQbZc0J-Hvmh8OOzpqEQ/exec';

// GAS通信（fetch + redirect対応）
async function gasCall(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  try {
    const res = await fetch(url, {
      method: 'GET',
      redirect: 'follow',
    });
    const text = await res.text();
    // JSONをそのままパース
    const trimmed = text.trim();
    try {
      return JSON.parse(trimmed);
    } catch(_) {
      // callback(...) 形式の場合
      const start = trimmed.indexOf('(');
      const end = trimmed.lastIndexOf(')');
      if (start !== -1 && end !== -1) return JSON.parse(trimmed.slice(start+1, end));
      return { error: '解析エラー: ' + trimmed.slice(0, 100) };
    }
  } catch(e) {
    console.error('GAS通信エラー:', e);
    return { error: e.toString() };
  }
}

// ===== INIT =====
async function init() {
  const d = new Date();
  const wd = ['日','月','火','水','木','金','土'];
  document.getElementById('kioskDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;

  showLoading(true);

  // GASからメンバー・本日の出席・売上を取得
  try {
    const [mRes, aRes, sRes] = await Promise.all([
      gasCall({action:'getMembers'}),
      gasCall({action:'getAttendance'}),
      gasCall({action:'getSales', month: todayStr.slice(0,7)}),
    ]);

    console.log('メンバー取得結果:', JSON.stringify(mRes));

    if (mRes.members) members = mRes.members.map(m => ({...m, visits:[]}));

    if (aRes.attendance) {
      // 出席データを attendance 形式に変換
      attendance = [];
      aRes.attendance.forEach(r => {
        let rec = attendance.find(a => a.date===r.date && a.classId===r.classId);
        if (!rec) {
          rec = {date:r.date, classId:r.classId, className:r.className, attendees:[]};
          attendance.push(rec);
        }
        rec.attendees.push({memberId:r.memberId, name:r.name, ticket:r.ticket, time:r.time});
        // メンバーの来訪履歴にも追加
        const member = members.find(m => m.id === r.memberId);
        if (member) member.visits.push({date:r.date, class:r.className, time:r.time});
      });
      // 来訪履歴を日付降順に並べ直す
      members.forEach(m => m.visits.sort((a,b) => b.date.localeCompare(a.date)));
    }

    if (sRes.sales) sales = sRes.sales;
  } catch(e) {
    toast('データ読み込みエラー。オフラインで動作します。', 'err');
  }

  showLoading(false);
  updateKioskClassDisplay();
  renderMemberGrid();
  renderAdminClassBtns();
  renderCalendar();
  renderMCards();
  salesMonth = new Date();
  renderSales();
  updateSelects();
}

// あいうえお絞り込み
const AIUEO_RANGES = {
  'あ': ['あ','い','う','え','お','ア','イ','ウ','エ','オ'],
  'か': ['か','き','く','け','こ','カ','キ','ク','ケ','コ'],
  'さ': ['さ','し','す','せ','そ','サ','シ','ス','セ','ソ'],
  'た': ['た','ち','つ','て','と','タ','チ','ツ','テ','ト'],
  'な': ['な','に','ぬ','ね','の','ナ','ニ','ヌ','ネ','ノ'],
  'は': ['は','ひ','ふ','へ','ほ','ハ','ヒ','フ','ヘ','ホ'],
  'ま': ['ま','み','む','め','も','マ','ミ','ム','メ','モ'],
  'や': ['や','ゆ','よ','ヤ','ユ','ヨ'],
  'ら': ['ら','り','る','れ','ろ','ラ','リ','ル','レ','ロ'],
  'わ': ['わ','を','ん','ワ','ヲ','ン'],
};
let currentFilter = '';

function filterGrid(row) {
  currentFilter = row;
  document.querySelectorAll('.aiueo-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === (row || '全員'));
  });
  renderMemberGrid();
}

function matchFilter(name) {
  if (!currentFilter) return true;
  const chars = AIUEO_RANGES[currentFilter] || [];
  // 名前の最初の文字（スペース除く）で判定
  const first = name.replace(/\s/g, '')[0] || '';
  return chars.includes(first);
}

function renderMemberGrid() {

      <div class="member-tap-btn" style="opacity:0.4;pointer-events:none;">

    return `<div class="member-tap-btn${done?' signed-in':''}" onclick="kioskSignIn('${m.id}',event)">

async function kioskSignIn(memberId, e) {
  if (!kioskClass) return;
  if (kioskAttendees.includes(memberId)) { toast('すでにサインイン済みです','err'); return; }

  // Ripple
  const btn = e.currentTarget;
  const ripple = document.createElement('span');
  ripple.className = 'tap-ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 600);

  const member = members.find(m=>m.id===memberId);
  const time = nowTime();

  kioskAttendees.push(memberId);
  const entry = {memberId, name:member.name, ticket:member.ticket, time};

  let rec = attendance.find(a=>a.date===todayStr&&a.classId===kioskClass.id);
  if (!rec) { rec={date:todayStr, classId:kioskClass.id, className:kioskClass.name, attendees:[]}; attendance.push(rec); }
  rec.attendees.push(entry);
  member.visits.unshift({date:todayStr, class:kioskClass.name, time});
  if (member.ticketRemaining!==null && member.ticketRemaining>0) {
    member.ticketRemaining--;
    // GASに残回数更新
    gasCall({action:'updateMember', id:memberId, ticketRemaining: member.ticketRemaining});
  }

  renderMemberGrid();

  // GASに出席記録を保存
  gasCall({action:'addAttendance', date:todayStr, classId:kioskClass.id, className:kioskClass.name,
    memberId, name:member.name, ticket:member.ticket, time});

  // 完了オーバーレイ
  const ov = document.getElementById('checkinOverlay');
  document.getElementById('checkinName').textContent = member.name + ' さん';
  document.getElementById('checkinClass').textContent = kioskClass.name + '　' + time;
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'), 2200);
}

function renderCalendar() {
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  document.getElementById('calMn').textContent=`${y}年 ${m+1}月`;
  const fd=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  let h='';
  for(let i=0;i<fd;i++) h+=`<div class="cal-d empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hc=attendance.some(a=>a.date===ds);
    const it=ds===todayStr, is=ds===calSel;
    h+=`<div class="cal-d${it?' today':''}${is?' sel':''}${hc?' has':''}" onclick="selCalDate('${ds}')">${d}</div>`;
  }
  document.getElementById('calDg').innerHTML=h;
}

let regAmtVal = 0;
let recAmtVal = 0;
let selPayMethod = 'cash';

// Ticket prices
const ticketPrices = { monthly:8000, drop:2000, '10':16000, free:0 };
const payLabels = { cash:'現金', paypay:'PayPay', transfer:'振込', other:'その他' };
const payClasses = { cash:'pay-cash', paypay:'pay-paypay', transfer:'pay-transfer', other:'pay-other' };

function regItemChanged() {
  const sel = document.getElementById('regItem');
  const opt = sel.options[sel.selectedIndex];
  const price = opt.dataset.price;
  if (price !== undefined) {
    regAmtVal = parseInt(price);
    updateRegDisplay();
  }
}

function regKey(k) {
  if (regAmtVal === 0) regAmtVal = parseInt(k);
  else regAmtVal = parseInt(String(regAmtVal) + k);
  if (regAmtVal > 9999999) regAmtVal = 9999999;
  updateRegDisplay();
}
function regClear() { regAmtVal = 0; updateRegDisplay(); }
function regSet(v) { regAmtVal = v; updateRegDisplay(); }

function recKey(k) {
  if (recAmtVal === 0) recAmtVal = parseInt(k);
  else recAmtVal = parseInt(String(recAmtVal) + k);
  if (recAmtVal > 9999999) recAmtVal = 9999999;
  updateRecDisplay();
}
function recClear() { recAmtVal = 0; updateRecDisplay(); }
function recSet(v) { recAmtVal = v; updateRecDisplay(); }

function updateRegDisplay() {
  document.getElementById('regAmount').textContent = '¥ ' + regAmtVal.toLocaleString();
  updateChange();
}
function updateRecDisplay() {
  document.getElementById('regReceived').textContent = '¥ ' + recAmtVal.toLocaleString();
  updateChange();
}
function updateChange() {
  const change = recAmtVal - regAmtVal;
  const el = document.getElementById('changeAmt');
  el.textContent = '¥ ' + Math.abs(change).toLocaleString();
  el.className = 'change-amount' + (change < 0 ? ' negative' : '');
}

function selPay(method) {
  selPayMethod = method;
  document.querySelectorAll('#payMethodBtns .pay-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  // 現金のときだけお預かり・おつりを表示
  const cashOnly = document.getElementById('cashOnlySection');
  cashOnly.style.display = method === 'cash' ? 'block' : 'none';
  if (method !== 'cash') { recAmtVal = 0; updateRecDisplay(); }
}

async function completePayment() {
  if (regAmtVal === 0) { toast('金額を入力してください', 'err'); return; }
  const memberId = document.getElementById('regMember').value;
  const member = members.find(m => m.id === memberId);
  const itemSel = document.getElementById('regItem');
  const typeId = itemSel.value;
  const itemLabel = itemSel.options[itemSel.selectedIndex]?.text || '−';

  const sale = {
    date: todayStr,
    memberId: memberId || '',
    name: member?.name || '（未選択）',
    item: itemLabel,
    typeId,
    amount: regAmtVal,
    received: recAmtVal,
    change: recAmtVal - regAmtVal,
    payMethod: selPayMethod,
  };
  sales.unshift(sale);

  // チケット自動登録・メンバー更新
  if (member && typeId && typeId !== 'custom') {
    const ttype = TICKET_TYPES.find(t => t.id === typeId);
    if (ttype) {
      member.ticket = typeId;
      member.ticketRemaining = ttype.remaining;
      // GASにメンバー情報更新
      gasCall({action:'updateMember', id:memberId, ticket:typeId, ticketRemaining: ttype.remaining ?? 'null'});
    }
  }

  // GASに売上記録を保存
  gasCall({action:'addSale', ...sale});

  // リセット
  regAmtVal = 0; recAmtVal = 0;
  updateRegDisplay(); updateRecDisplay();
  document.getElementById('regItem').value = '';
  document.querySelectorAll('#payMethodBtns .pay-btn').forEach(b => b.classList.remove('selected'));
  renderSales();
  renderMCards();
  toast(`¥${sale.amount.toLocaleString()} — ${payLabels[selPayMethod]}で記録しました`);
}

// ===== SALES =====
let salesMonth = new Date();

function salesMo(dir) {
  salesMonth.setMonth(salesMonth.getMonth() + dir);
  renderSales();
}

function renderSales() {
  const y = salesMonth.getFullYear(), m = salesMonth.getMonth();
  document.getElementById('salesMonthTitle').textContent = `${y}年 ${m+1}月`;
  const mStr = `${y}-${String(m+1).padStart(2,'0')}`;
  const mSales = sales.filter(s => s.date.startsWith(mStr));

  // Summary
  const total = mSales.reduce((a,s) => a + s.amount, 0);
  const counts = {};
  mSales.forEach(s => { counts[s.payMethod] = (counts[s.payMethod]||0) + s.amount; });

  document.getElementById('salesSummary').innerHTML = `
    <div class="sales-box">
      <div class="sales-box-val">¥${total.toLocaleString()}</div>
      <div class="sales-box-lbl">月間売上合計</div>
    </div>
    <div class="sales-box">
      <div class="sales-box-val">${mSales.length}</div>
      <div class="sales-box-lbl">件数</div>
    </div>`;

  // Breakdown by pay method
  const bk = ['cash','paypay','transfer','other'].map(p => {
    const amt = counts[p] || 0;
    return amt > 0 ? `<div class="sales-row">
      <span><span class="sales-row-pay ${payClasses[p]}">${payLabels[p]}</span></span>
      <span class="sales-row-amt">¥${amt.toLocaleString()}</span>
    </div>` : '';
  }).join('');
  document.getElementById('salesBreakdown').innerHTML = bk || '<div class="empty" style="padding:16px"><div class="empty-txt">記録なし</div></div>';

  // Daily list
  if (!mSales.length) {
    document.getElementById('salesList').innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">この月の記録はありません</div></div>';
    return;
  }
  document.getElementById('salesList').innerHTML = mSales.map(s => `
    <div class="sales-row">
      <div class="sales-row-left">
        <span class="sales-row-date">${s.date}　${s.name}</span>
        <span class="sales-row-name" style="font-size:0.75rem;color:var(--sage)">${s.item}</span>
      </div>
      <div class="sales-row-right">
        <span class="sales-row-pay ${payClasses[s.payMethod]}">${payLabels[s.payMethod]}</span>
        <span class="sales-row-amt">¥${s.amount.toLocaleString()}</span>
      </div>
    </div>`).join('');
}


function renderTktTable() {
  document.getElementById('tktBody').innerHTML = tickets.map(t=>`
    <tr>
      <td style="font-family:'Space Mono',monospace;font-size:0.72rem;">${t.date}</td>
      <td>${t.name}</td>
      <td><span class="badge b-monthly">${tLabel(t.type)}</span></td>
      <td style="font-family:'Space Mono',monospace;">${t.remaining !== null ? t.remaining : '−'}</td>
      <td style="color:var(--sage);font-size:0.72rem;">${t.note}</td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--sage-light);padding:16px;">記録なし</td></tr>';
}

function addTicket() {
  const memberId = document.getElementById('tktMember').value;
  const typeId   = document.getElementById('tktType').value;
  const date     = document.getElementById('tktDate').value;
  const note     = document.getElementById('tktNote').value.trim();
  const member   = members.find(m=>m.id===memberId);
  if (!member) return;
  const ttype    = TICKET_TYPES.find(t=>t.id===typeId);
  const remaining = ttype?.remaining ?? null;
  member.ticket = typeId;
  member.ticketRemaining = remaining;
  tickets.unshift({date, memberId, name:member.name, type:typeId, remaining, note});
  renderTktTable();
  renderMCards();
  document.getElementById('tktNote').value = '';
  toast(`${member.name} さん — ${ttype?.label} を登録しました`);
}

function updateSelects() {
  const mOpts = members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('manualSelect').innerHTML = mOpts;
  document.getElementById('regMember').innerHTML = `<option value="">（未選択）</option>` + mOpts;

  document.getElementById('regItem').innerHTML =
    `<option value="">選択してください</option>` +
    TICKET_TYPES.map(t=>
      `<option value="${t.id}" data-price="${t.price}">${t.label}　¥${t.price.toLocaleString()}</option>`
    ).join('') +
    `<option value="custom" data-price="0">金額を直接入力</option>`;
}

init();
</script>
</body>
</html>
